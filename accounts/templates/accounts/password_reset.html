{% extends 'base_clean.html' %}
{% load static %}

{% block title %}Восстановление пароля{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-page">
        <div class="login-form-container">
            <div class="login-form">
                <h2 class="login-title">Восстановление пароля</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Введите ваш email" required>
                    </div>
                    
                    <button type="submit" class="login-button">Отправить</button>
                </form>
                
                <div class="register-link">
                    <p><a href="{% url 'login' %}">← Вернуться ко входу</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>© 1998–2026 ООО «Элком». Все права защищены.</p>
    </div>
</div>
{% endblock %}
